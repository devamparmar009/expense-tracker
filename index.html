<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#15161f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Expense Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

<div id="auth-overlay" style="display:none"></div>

<div id="main-content" style="display:none">

  <div class="aurora"></div>
  <div id="particles-js"></div>

  <!-- Top Nav -->
  <nav class="top-nav">
    <div class="nav-brand">
      <span class="brand-mark"><svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg></span>
      Expense Tracker
    </div>
    <a href="index.html" class="nav-link"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>Dashboard</a>
    <a href="expenses.html" class="nav-link"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 17.5v-11"/></svg>Expenses</a>
    <a href="analytics.html" class="nav-link"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v16a2 2 0 0 0 2 2h16"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>Analytics</a>
    <a href="settings.html" class="nav-link"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2Z"/><circle cx="12" cy="12" r="3"/></svg>Settings</a>
  </nav>

  <main class="page">

    <!-- Hero -->
    <section class="hero">
      <div class="donut-wrap">
        <svg class="donut-svg" width="210" height="210" viewBox="0 0 200 200">
          <defs>
            <linearGradient id="donutGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#6E8BFF"/>
              <stop offset="100%" stop-color="#B98CF5"/>
            </linearGradient>
          </defs>
          <circle class="donut-track" cx="100" cy="100" r="80"/>
          <circle class="donut-fill" id="donut-fill" cx="100" cy="100" r="80"/>
        </svg>
        <div class="donut-center">
          <div class="donut-remaining" id="donut-remaining">₹0</div>
          <div class="donut-label">remaining</div>
        </div>
      </div>

      <div class="hero-info">
        <div class="hero-month" id="month-label">June 2026</div>
        <div class="hero-remaining" id="hero-remaining">₹0</div>
        <div class="hero-sub">of <span id="hero-budget">₹0</span> budget</div>
        <div class="budget-track" style="margin-top:16px;"><div class="budget-fill" id="budget-fill" style="width:0%"></div></div>
        <div id="overspent-banner" class="overspent-banner" style="display:none;margin-top:16px;"></div>
        <div style="margin-top:22px;">
          <button class="btn btn-primary" onclick="openExpenseModal()" id="hero-add-btn"></button>
        </div>
      </div>
    </section>

    <!-- Stat Cards -->
    <div class="grid-3" style="margin-bottom:26px;">
      <div class="stat-card animate-fade-up" id="card-spent"></div>
      <div class="stat-card animate-fade-up" id="card-remaining"></div>
      <div class="stat-card animate-fade-up" id="card-days"></div>
    </div>

    <!-- Top Categories + Recent -->
    <div class="grid-2">
      <div class="card animate-fade-up">
        <div class="section-header">
          <div class="section-title">Top Categories</div>
          <a href="analytics.html" class="section-action" id="topcat-link">See all</a>
        </div>
        <div id="top-categories"></div>
      </div>

      <div class="card animate-fade-up">
        <div class="section-header">
          <div class="section-title">Recent Transactions</div>
          <a href="expenses.html" class="section-action" id="recent-link">View all</a>
        </div>
        <div id="recent-transactions"></div>
      </div>
    </div>
  </main>

  <button class="fab" onclick="openExpenseModal()" title="Add expense" id="fab-btn"></button>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="index.html" class="bottom-nav-item"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>Dashboard</a>
    <a href="expenses.html" class="bottom-nav-item"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 17.5v-11"/></svg>Expenses</a>
    <a href="analytics.html" class="bottom-nav-item"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v16a2 2 0 0 0 2 2h16"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>Analytics</a>
    <a href="settings.html" class="bottom-nav-item"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2Z"/><circle cx="12" cy="12" r="3"/></svg>Settings</a>
  </nav>

</div>

<!-- Add Expense Modal -->
<div class="modal-backdrop" id="expense-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">Add Expense</div>

    <div class="form-group">
      <label>Amount</label>
      <div class="amount-input-wrap">
        <span class="currency-symbol">₹</span>
        <input type="number" id="exp-amount" placeholder="0" min="1" inputmode="decimal" />
      </div>
    </div>

    <div class="form-group">
      <label>Category</label>
      <div class="category-grid" id="cat-grid"></div>
    </div>

    <div class="form-group">
      <label>Note <span style="color:var(--text-muted);font-weight:400;text-transform:none;">(optional)</span></label>
      <input type="text" id="exp-note" placeholder="What did you spend on?" />
    </div>

    <div class="form-group">
      <label>Payment Method</label>
      <div class="pm-tabs" id="pm-tabs"></div>
    </div>

    <div class="form-group">
      <label>Date</label>
      <input type="date" id="exp-date" />
    </div>

    <div style="display:flex;gap:12px;margin-top:24px;">
      <button class="btn btn-ghost" style="flex:1" onclick="closeExpenseModal()">Cancel</button>
      <button class="btn btn-primary" style="flex:2" id="exp-submit" onclick="submitExpense()">Add Expense</button>
    </div>
  </div>
</div>

<div class="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="js/icons.js"></script>
<script src="js/sync.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/storage.js"></script>
<script src="js/dashboard.js"></script>
<script>
  if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js').catch(() => {}); }
</script>
</body>
</html>
